{% extends "base.html" %}
{% block title %}Submit Custom Project - ProjectMate{% endblock %}

{% block content %}
<div class="form-container" style="max-width: 520px;">
    <div class="card">
        <h2>Submit Your Own Project</h2>
        <p style="color: var(--text-muted); text-align: center; margin-bottom: 24px;">Have a unique idea? Submit your project details and we'll get back to you.</p>

        <form method="POST">
            <div class="form-group">
                <label>Project Title</label>
                <input name="title" placeholder="Enter your project title" required>
            </div>
            <div class="form-group">
                <label>Problem Statement</label>
                <textarea name="problem" placeholder="Describe the problem your project aims to solve..." required style="width: 100%; padding: 12px 16px; background: var(--bg-secondary); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text-primary); font-size: 1rem; min-height: 100px; resize: vertical; outline: none; font-family: inherit;"></textarea>
            </div>
            <div class="form-group">
                <label>Objective</label>
                <textarea name="objective" placeholder="What is the objective of this project?" required style="width: 100%; padding: 12px 16px; background: var(--bg-secondary); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text-primary); font-size: 1rem; min-height: 100px; resize: vertical; outline: none; font-family: inherit;"></textarea>
            </div>
            <div class="form-group">
                <label>Expected Outcome</label>
                <textarea name="outcome" placeholder="What outcome do you expect from this project?" required style="width: 100%; padding: 12px 16px; background: var(--bg-secondary); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text-primary); font-size: 1rem; min-height: 100px; resize: vertical; outline: none; font-family: inherit;"></textarea>
            </div>
            <button class="btn btn-primary form-submit" type="submit">Submit Project Request</button>
        </form>
    </div>
</div>
{% endblock %}
